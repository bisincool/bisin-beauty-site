name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 10022 sv17041.xserver.jp >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 10022" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='CNAME' \
            ./ bisin202603@sv17041.xserver.jp:/home/bisin202603/bisincool.co.jp/public_html/coolspa.bisincool.co.jp/
